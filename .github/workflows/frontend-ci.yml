name: Frontend CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'tec-frontend/**'
      - '.github/workflows/frontend-ci.yml'

permissions:
  contents: read

jobs:
  frontend-quality:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tec-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tec-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
