name: Validate Environment Config

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  validate-env:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for placeholder Gateway URLs
        run: |
          echo "🔍 Checking for placeholder Gateway URLs..."

          # Check source files for known placeholder patterns
          PLACEHOLDER_PATTERNS=(
            "your-api-gateway.example.com"
            "your-api-gateway-url"
            "localhost:3000/api"
            "CHANGE_ME"
          )

          FOUND_ISSUES=0

          for pattern in "${PLACEHOLDER_PATTERNS[@]}"; do
            if grep -r "$pattern" --include="*.env*" --include="*.ts" --include="*.tsx" --include="*.js" .; then
              echo "❌ Found placeholder pattern: $pattern"
              FOUND_ISSUES=$((FOUND_ISSUES + 1))
            fi
          done

          if [ $FOUND_ISSUES -gt 0 ]; then
            echo "❌ Found $FOUND_ISSUES placeholder pattern(s). Please replace with actual values."
            exit 1
          fi

          echo "✅ No placeholder patterns found."

      - name: Validate .env.example has NEXT_PUBLIC_API_GATEWAY_URL
        run: |
          echo "🔍 Checking .env.example files..."

          for env_file in $(find . -name ".env.example" -not -path "*/node_modules/*"); do
            echo "Checking $env_file..."
            if grep -q "NEXT_PUBLIC_API_GATEWAY_URL" "$env_file"; then
              VALUE=$(grep "NEXT_PUBLIC_API_GATEWAY_URL" "$env_file" | cut -d'=' -f2)
              if [ -z "$VALUE" ] || [ "$VALUE" = "https://your-api-gateway.example.com" ]; then
                echo "❌ $env_file has empty or placeholder NEXT_PUBLIC_API_GATEWAY_URL"
                exit 1
              fi
              echo "✅ $env_file — NEXT_PUBLIC_API_GATEWAY_URL is set"
            fi
          done

          echo "✅ All .env.example files validated."
